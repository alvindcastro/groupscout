openapi: 3.0.3
info:
  title: GroupScout API
  description: API for managing lead collection, enrichment, and notification.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Lead Generation Server (default)
  - url: http://localhost:8081
    description: Alerting Service (alertd)
paths:
  /health:
    get:
      summary: Health check
      description: Returns the status of the server and database connection.
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '503':
          description: Database connection failed
  /run:
    post:
      summary: Trigger pipeline
      description: Manually triggers the collect-enrich-notify pipeline.
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bcbid_raw_input:
                  type: string
                  description: Optional raw input for BC Bid collector.
      responses:
        '200':
          description: Pipeline completed successfully
        '401':
          description: Unauthorized
        '500':
          description: Pipeline execution failed
  /digest:
    post:
      summary: Trigger weekly digest
      description: Sends a weekly digest of leads via email.
      security:
        - BearerAuth: []
      parameters:
        - name: to
          in: query
          description: Recipient email address (defaults to alvin@groupscout.ai)
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Digest sent successfully
        '401':
          description: Unauthorized
        '500':
          description: Failed to send digest
  /n8n/webhook:
    post:
      summary: Receive lead from n8n
      description: Endpoint for n8n to push new leads into the system.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Lead'
      responses:
        '201':
          description: Lead created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  id:
                    type: string
        '400':
          description: Invalid JSON body
        '401':
          description: Unauthorized
        '500':
          description: Failed to store lead
  /slack/inventory:
    post:
      summary: Update room inventory (Slack Slash Command)
      description: Receives a numeric room count update from a Slack slash command.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: Numeric room count (as a string from Slack form)
      responses:
        '200':
          description: Inventory updated successfully
        '400':
          description: Invalid room count or form parse failure
        '405':
          description: Method not allowed
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    Lead:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        RawProjectID:
          type: string
        Source:
          type: string
        Title:
          type: string
        Location:
          type: string
        ProjectValue:
          type: integer
          format: int64
        GeneralContractor:
          type: string
        Applicant:
          type: string
        Contractor:
          type: string
        SourceURL:
          type: string
          format: uri
        ProjectType:
          type: string
        EstimatedCrewSize:
          type: integer
        EstimatedDurationMonths:
          type: integer
        OutOfTownCrewLikely:
          type: boolean
        PriorityScore:
          type: integer
        PriorityReason:
          type: string
        SuggestedOutreachTiming:
          type: string
        Notes:
          type: string
        Status:
          type: string
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
