services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/root/data
    environment:
      - DATABASE_URL=/root/data/groupscout.db
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - API_TOKEN=${API_TOKEN}
      - RICHMOND_PERMITS_URL=${RICHMOND_PERMITS_URL}
      - DELTA_PERMITS_URL=${DELTA_PERMITS_URL}
      - CREATIVEBC_ENABLED=true
      - CREATIVEBC_URL=https://www.creativebc.com/search-projects/in-production/
      - VCC_ENABLED=true
      - VCC_URL=https://www.vancouverconventioncentre.com/events/calendar
      - BCBID_ENABLED=true
      - NEWS_ENABLED=true
      - ANNOUNCEMENTS_ENABLED=true
      - EVENTBRITE_ENABLED=true
      - MIN_PERMIT_VALUE_CAD=500000
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_DB=groupscout
      - POSTGRES_USER=groupscout
      - POSTGRES_PASSWORD=groupscout
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groupscout"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    restart: unless-stopped

volumes:
  pgdata:
  n8n_data:
  prometheus_data:
  grafana_data:
